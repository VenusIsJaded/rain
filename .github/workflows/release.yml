name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build --release-branch=main --build-bytecode

      - name: Generate release tag
        id: tag
        run: |
          if [ -f dist/info.json ]; then
            VERSION=$(jq -r '.version' dist/info.json)
          else
            VERSION=$(grep '"version"' package.json 2>/dev/null | head -1 | sed 's/.*: "\(.*\)",/1/' || echo "0.0.0")
          fi
          BUILD=$(date +%Y%m%d-%H%M%S)
          echo "name=v${VERSION}-${BUILD}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: dist/*
          generate_release_notes: false
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
